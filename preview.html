<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>产品目录 - 小程序预览</title>
<script src="products.js"></script>
<style>
  :root {
    --bg-primary: #0a0a0f;
    --bg-card: #14141f;
    --text-primary: #f5f5f5;
    --text-secondary: #9e9e9e;
    --accent: #00e5ff;
    --accent-warm: #ff6d00;
    --divider: #1e1e2e;
    --safe-bottom: 20px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }
  .phone {
    width: 390px;
    height: 844px;
    background: var(--bg-primary);
    border-radius: 40px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 0 0 3px #1a1a2e, 0 0 60px rgba(0,229,255,0.08);
  }

  /* Status bar */
  .status-bar {
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    font-size: 12px;
    color: var(--text-primary);
    font-weight: 600;
  }
  .status-bar .time { font-size: 14px; font-weight: 700; }
  .status-icons { display:flex; gap:6px; align-items:center; font-size:11px; }

  /* Nav bar */
  .nav-bar {
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    color: var(--text-primary);
    font-size: 17px;
    font-weight: 600;
    border-bottom: 0.5px solid var(--divider);
  }
  .nav-back {
    position: absolute;
    left: 16px;
    font-size: 20px;
    color: var(--accent);
    cursor: pointer;
    background: none;
    border: none;
    padding: 8px;
  }
  .nav-share {
    position: absolute;
    right: 16px;
    font-size: 18px;
    cursor: pointer;
    background: none;
    border: none;
    padding: 8px;
  }

  /* Pages container */
  .pages { height: calc(844px - 44px - 44px - 60px); overflow-y: auto; }
  .page { display: none; padding-bottom: 20px; }
  .page.active { display: block; }

  /* Tab bar */
  .tab-bar {
    height: 60px;
    display: flex;
    align-items: center;
    border-top: 0.5px solid var(--divider);
    background: var(--bg-primary);
    padding-bottom: env(safe-area-inset-bottom);
  }
  .tab-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    cursor: pointer;
    border: none;
    background: none;
    color: var(--text-secondary);
    font-size: 10px;
    padding: 8px 0;
    transition: color 0.2s;
  }
  .tab-item.active { color: var(--accent); }
  .tab-icon { font-size: 22px; }

  /* Scrollbar */
  .pages::-webkit-scrollbar { width: 0; }

  /* === COMPONENTS === */

  /* Search bar */
  .search-bar {
    display: flex;
    align-items: center;
    margin: 12px 16px;
    padding: 10px 14px;
    background: var(--bg-card);
    border-radius: 12px;
    cursor: pointer;
  }
  .search-bar .icon { font-size: 15px; margin-right: 8px; }
  .search-bar .placeholder { color: var(--text-secondary); font-size: 15px; }
  .search-bar input {
    flex: 1; background: none; border: none; color: var(--text-primary);
    font-size: 15px; outline: none;
  }
  .search-bar .clear { color: var(--text-secondary); cursor: pointer; padding: 4px 8px; font-size: 16px; }

  /* Swiper */
  .banner { width: 100%; height: 200px; position: relative; overflow: hidden; }
  .banner-slide {
    width: 100%; height: 100%; display: flex;
    align-items: flex-end; padding: 0 0 20px 20px;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    position: relative;
  }
  .banner-slide::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(transparent 40%, rgba(10,10,15,0.95));
  }
  .banner-info { position: relative; z-index: 1; }
  .banner-tag {
    display: inline-block; padding: 2px 10px; border-radius: 10px;
    background: var(--accent-warm); color: #fff; font-size: 11px; margin-bottom: 6px;
  }
  .banner-name { color: var(--text-primary); font-size: 20px; font-weight: 700; display: block; }
  .banner-price { color: var(--accent); font-size: 18px; font-weight: 700; margin-top: 4px; display: block; }
  .banner-dots { position: absolute; bottom: 10px; right: 16px; display: flex; gap: 6px; z-index: 2; }
  .banner-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-secondary); }
  .banner-dot.active { background: var(--accent); width: 18px; border-radius: 3px; }

  /* Category grid */
  .cat-grid { display: flex; justify-content: space-around; padding: 20px 12px; }
  .cat-item {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    cursor: pointer; padding: 8px; border: none; background: none; color: var(--text-secondary);
  }
  .cat-icon {
    width: 52px; height: 52px; border-radius: 14px; display: flex;
    align-items: center; justify-content: center; font-size: 24px;
    background: var(--bg-card);
  }
  .cat-name { font-size: 12px; }

  /* Section */
  .section { padding: 0 16px; }
  .section-title { font-size: 18px; font-weight: 700; color: var(--text-primary); margin-bottom: 12px; }

  /* Product card grid */
  .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .product-card {
    background: var(--bg-card); border-radius: 10px; overflow: hidden; cursor: pointer;
    transition: transform 0.15s;
  }
  .product-card:active { transform: scale(0.97); }
  .product-img {
    width: 100%; height: 160px; object-fit: cover;
    background: linear-gradient(135deg, #1a1a2e, #162447);
  }
  .product-placeholder {
    width: 100%; height: 160px; display: flex; align-items: center;
    justify-content: center; font-size: 48px; background: linear-gradient(135deg, #1a1a2e, #162447);
  }
  .product-body { padding: 12px; }
  .product-name {
    font-size: 14px; color: var(--text-primary); line-height: 1.4;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .product-price { font-size: 17px; font-weight: 700; color: var(--accent); margin-top: 6px; display: block; }

  /* Category tabs */
  .cat-tabs {
    display: flex; gap: 10px; padding: 14px 16px; white-space: nowrap;
    border-bottom: 0.5px solid var(--divider); overflow-x: auto;
  }
  .cat-tabs::-webkit-scrollbar { height: 0; }
  .cat-tab {
    padding: 8px 20px; border-radius: 20px; font-size: 14px;
    color: var(--text-secondary); background: var(--bg-card);
    cursor: pointer; border: none; white-space: nowrap; transition: all 0.2s;
  }
  .cat-tab.active { color: #0a0a0f; background: var(--accent); font-weight: 600; }
  .cat-count { padding: 8px 16px 4px; font-size: 13px; color: var(--text-secondary); }

  /* Search result */
  .result-item {
    display: flex; align-items: center; padding: 14px 16px;
    border-bottom: 0.5px solid var(--divider); cursor: pointer;
  }
  .result-img { width: 64px; height: 64px; border-radius: 8px; background: var(--bg-card); flex-shrink: 0; object-fit: cover; }
  .result-placeholder { width: 64px; height: 64px; border-radius: 8px; background: var(--bg-card); display: flex; align-items: center; justify-content: center; font-size: 28px; flex-shrink: 0; }
  .result-body { flex: 1; margin-left: 14px; }
  .result-name { font-size: 15px; color: var(--text-primary); }
  .result-meta { font-size: 12px; color: var(--text-secondary); margin-top: 3px; }
  .result-price { font-size: 16px; font-weight: 700; color: var(--accent); margin-top: 4px; }

  .hot-tags { display: flex; flex-wrap: wrap; gap: 10px; padding: 0 16px; }
  .hot-tag {
    padding: 8px 18px; border-radius: 20px; font-size: 13px;
    background: var(--bg-card); color: var(--text-secondary); cursor: pointer; border: none;
  }
  .hot-tag:hover { color: var(--accent); }

  /* Detail */
  .detail-swiper {
    width: 100%; height: 280px; background: var(--bg-card);
    display: flex; align-items: center; justify-content: center; position: relative;
  }
  .detail-img { width: 100%; height: 100%; object-fit: contain; }
  .detail-placeholder-2 { font-size: 72px; }
  .detail-dots {
    position: absolute; bottom: 12px; display: flex; gap: 6px;
    left: 50%; transform: translateX(-50%);
  }
  .info-section { padding: 20px 16px; }
  .info-name { font-size: 20px; font-weight: 700; color: var(--text-primary); }
  .info-price { font-size: 24px; font-weight: 700; color: var(--accent); margin-top: 10px; display: block; }
  .info-meta { font-size: 13px; color: var(--text-secondary); margin-top: 6px; display: block; }
  .desc-section { margin: 0 16px 16px; padding: 16px; background: var(--bg-card); border-radius: 10px; }
  .desc-text { color: var(--text-secondary); font-size: 14px; line-height: 1.6; }
  .specs-section { margin: 0 16px; }
  .specs-title { font-size: 16px; font-weight: 600; color: var(--text-primary); margin-bottom: 10px; display: block; }
  .specs-table { background: var(--bg-card); border-radius: 10px; overflow: hidden; }
  .spec-row { display: flex; justify-content: space-between; padding: 12px 16px; border-bottom: 0.5px solid var(--divider); }
  .spec-row:last-child { border-bottom: none; }
  .spec-key { color: var(--text-secondary); font-size: 13px; }
  .spec-value { color: var(--text-primary); font-size: 13px; }

  /* Bottom bar */
  .bottom-bar {
    position: absolute; bottom: 60px; left: 0; right: 0;
    padding: 10px 16px; background: var(--bg-primary);
    border-top: 0.5px solid var(--divider); z-index: 10;
  }
  .btn-copy {
    width: 100%; padding: 14px; border-radius: 12px; border: none;
    background: var(--accent); color: #0a0a0f; font-size: 17px; font-weight: 700;
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-copy:active { opacity: 0.85; }

  /* About */
  .about-container { display: flex; flex-direction: column; align-items: center; padding: 40px 24px; text-align: center; }
  .brand-name { font-size: 24px; font-weight: 700; color: var(--text-primary); }
  .brand-desc { font-size: 14px; color: var(--text-secondary); margin-top: 8px; }
  .stat-box { margin: 28px 0; padding: 20px 48px; background: var(--bg-card); border-radius: 14px; }
  .stat-num { font-size: 36px; font-weight: 700; color: var(--accent); display: block; }
  .stat-label { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
  .contact-card {
    width: 100%; padding: 18px; background: var(--bg-card); border-radius: 14px;
    cursor: pointer; margin-bottom: 24px;
  }
  .contact-card:active { opacity: 0.8; }
  .contact-label { font-size: 12px; color: var(--text-secondary); }
  .contact-val { font-size: 18px; font-weight: 600; color: var(--text-primary); margin-top: 4px; }
  .contact-hint { font-size: 12px; color: var(--accent); margin-top: 4px; }

  /* Toast */
  .toast {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    background: rgba(0,0,0,0.85); color: #fff; padding: 12px 24px;
    border-radius: 8px; font-size: 14px; z-index: 100; pointer-events: none;
    opacity: 0; transition: opacity 0.3s;
  }
  .toast.show { opacity: 1; }

  /* Empty state */
  .empty-state { text-align: center; padding: 60px 0; color: var(--text-secondary); font-size: 14px; }

  /* Loading */
  .loading-text { text-align: center; padding: 20px; color: var(--text-secondary); font-size: 13px; }
</style>
</head>
<body>

<div class="phone" id="app">
  <!-- Status Bar -->
  <div class="status-bar">
    <span class="time">9:41</span>
    <span class="status-icons">●●●● WiFi 🔋</span>
  </div>

  <!-- Nav Bar -->
  <div class="nav-bar" id="navBar">
    <button class="nav-back" id="navBack" style="display:none" onclick="goBack()">‹</button>
    <span id="navTitle">产品目录</span>
    <button class="nav-share" id="navShare" style="display:none">⋯</button>
  </div>

  <!-- Pages -->
  <div class="pages" id="pages">

    <!-- HOME -->
    <div class="page active" id="page-home">
      <div class="search-bar" onclick="showPage('search')">
        <span class="icon">🔍</span>
        <span class="placeholder">搜索产品</span>
      </div>

      <div class="banner" id="banner">
        <div class="banner-slide" style="background:linear-gradient(135deg, #1a1040 0%, #0d1b3e 50%, #0a2a2a 100%);">
          <div class="banner-info">
            <span class="banner-tag">新品</span>
            <span class="banner-name">Pro X1 降噪耳机</span>
            <span class="banner-price">¥299</span>
          </div>
        </div>
        <div class="banner-dots">
          <span class="banner-dot active"></span>
          <span class="banner-dot"></span>
          <span class="banner-dot"></span>
        </div>
      </div>

      <div class="cat-grid">
        <button class="cat-item" onclick="showCategory('耳机')"><span class="cat-icon">🎧</span><span class="cat-name">耳机</span></button>
        <button class="cat-item" onclick="showCategory('鼠标')"><span class="cat-icon">🖱️</span><span class="cat-name">鼠标</span></button>
        <button class="cat-item" onclick="showCategory('键盘')"><span class="cat-icon">⌨️</span><span class="cat-name">键盘</span></button>
        <button class="cat-item" onclick="showCategory('配件')"><span class="cat-icon">🔌</span><span class="cat-name">配件</span></button>
      </div>

      <div class="section">
        <div class="section-title">热门推荐</div>
        <div class="product-grid" id="hotGrid"></div>
      </div>
    </div>

    <!-- CATEGORY -->
    <div class="page" id="page-category">
      <div class="cat-tabs" id="catTabs"></div>
      <div class="cat-count" id="catCount"></div>
      <div class="product-grid" id="catGrid" style="padding:0 16px;"></div>
      <div class="loading-text" id="catLoading" style="display:none">加载中...</div>
      <div class="loading-text" id="catEnd" style="display:none">— 已展示全部 —</div>
      <div class="empty-state" id="catEmpty" style="display:none">暂无产品</div>
    </div>

    <!-- SEARCH -->
    <div class="page" id="page-search">
      <div class="search-bar">
        <span class="icon">🔍</span>
        <input type="text" placeholder="搜索产品" id="searchInput" oninput="doSearch()">
        <span class="clear" id="clearBtn" style="display:none" onclick="clearSearch()">✕</span>
      </div>
      <div class="hot-tags" id="hotTags" style="padding-top:16px;">
        <button class="hot-tag" onclick="quickSearch('蓝牙')">蓝牙</button>
        <button class="hot-tag" onclick="quickSearch('降噪')">降噪</button>
        <button class="hot-tag" onclick="quickSearch('无线')">无线</button>
        <button class="hot-tag" onclick="quickSearch('机械键盘')">机械键盘</button>
        <button class="hot-tag" onclick="quickSearch('游戏鼠标')">游戏鼠标</button>
        <button class="hot-tag" onclick="quickSearch('Type-C')">Type-C</button>
      </div>
      <div id="searchResults"></div>
    </div>

    <!-- DETAIL -->
    <div class="page" id="page-detail">
      <div class="detail-swiper" id="detailSwiper"></div>
      <div class="info-section" id="detailInfo"></div>
      <div class="desc-section" id="detailDesc" style="display:none"></div>
      <div class="specs-section" id="detailSpecs"></div>
      <div style="height:70px;"></div>
      <div class="bottom-bar">
        <button class="btn-copy" onclick="copyWechat()"><span>📋</span> 复制微信号</button>
      </div>
    </div>

    <!-- ABOUT -->
    <div class="page" id="page-about">
      <div class="about-container">
        <div class="brand-name">产品目录</div>
        <div class="brand-desc">科技消费品展示目录</div>
        <div class="stat-box">
          <span class="stat-num" id="aboutCount">--</span>
          <span class="stat-label">款产品</span>
        </div>
        <div style="font-size:14px;color:var(--text-secondary);margin-bottom:10px;">联系我们</div>
        <div class="contact-card" onclick="copyWechat()">
          <div class="contact-label">微信号</div>
          <div class="contact-val" id="aboutWechat">mywechatid</div>
          <div class="contact-hint">点击复制</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Tab Bar -->
  <div class="tab-bar">
    <button class="tab-item active" id="tab-home" onclick="switchTab('home')"><span class="tab-icon">🏠</span>首页</button>
    <button class="tab-item" id="tab-category" onclick="switchTab('category')"><span class="tab-icon">📂</span>分类</button>
    <button class="tab-item" id="tab-about" onclick="switchTab('about')"><span class="tab-icon">ℹ️</span>关于</button>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>
</div>

<script>
// === DATA (loaded from products.js) ===
const wechatId = 'OTU_ELECTRONICS';

// === STATE ===
let currentTab = 'home';
let currentPage = 'home';
let activeCategory = '充电器';
let pageStack = [];

// === CATEGORY CONFIG ===
const catIcons = {
  '充电器':'🔌', '车充':'🚗', '数据线':'🔗', '蓝牙耳机':'🎧', '有线耳机':'🎵',
  '蓝牙音箱':'🔊', '移动电源':'🔋', '车载支架':'📱', '排插':'⚡', '键鼠':'🖱️',
  '存储':'💾', '接收器':'📶'
};

// === RENDER ===
function renderHotProducts() {
  const hot = products.filter(p => p.isHot).sort((a,b) => b.sort - a.sort).slice(0, 8);
  document.getElementById('hotGrid').innerHTML = hot.map(p => productCardHTML(p)).join('');
}

function productCardHTML(p) {
  const colors = {'充电器':'#0d1b3e','车充':'#1a2a1a','数据线':'#16213e','蓝牙耳机':'#1a1040',
    '有线耳机':'#162447','蓝牙音箱':'#0a2a2a','移动电源':'#1a1a2e','车载支架':'#0d1b3e',
    '排插':'#1a1a2e','键鼠':'#16213e','存储':'#0d1b3e','接收器':'#1a1a2e'};
  const grad = colors[p.category] || '#1a1a2e';
  return `
    <div class="product-card" onclick="showDetail('${p.id}')">
      <div class="product-placeholder" style="background:linear-gradient(135deg, ${grad}, #0a0a0f);">
        ${catIcons[p.category] || '📦'}
      </div>
      <div class="product-body">
        <div class="product-name">${p.name}</div>
        <span class="product-price">¥${p.price || '询价'}</span>
      </div>
    </div>`;
}

function renderCategoryTabs() {
  document.getElementById('catTabs').innerHTML = categories.map(c =>
    `<button class="cat-tab${c===activeCategory?' active':''}" onclick="setCategory('${c}')">${c}</button>`
  ).join('');
}

function renderCategoryProducts() {
  const list = products.filter(p => p.category === activeCategory);
  document.getElementById('catCount').textContent = `共 ${list.length} 款`;
  document.getElementById('catGrid').innerHTML = list.map(p => productCardHTML(p)).join('');
  document.getElementById('catEmpty').style.display = list.length === 0 ? 'block' : 'none';
}

function renderHomeCategories() {
  const homeCats = categories.slice(0, 8);
  const grid = document.querySelector('#page-home .cat-grid');
  grid.innerHTML = homeCats.map(c =>
    `<button class="cat-item" onclick="showCategory('${c}')"><span class="cat-icon">${catIcons[c]||'📦'}</span><span class="cat-name">${c}</span></button>`
  ).join('');
}

// === NAVIGATION ===
function showPage(page, pushStack=true) {
  if (pushStack && currentPage !== page) {
    pageStack.push(currentPage);
  }
  currentPage = page;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');

  const nav = document.getElementById('navBar');
  const back = document.getElementById('navBack');
  const share = document.getElementById('navShare');
  const title = document.getElementById('navTitle');

  share.style.display = 'none';

  if (page === 'home') {
    back.style.display = 'none'; title.textContent = '产品目录';
    updateTabs('home');
  } else if (page === 'category') {
    back.style.display = 'none'; title.textContent = '分类';
    updateTabs('category');
    renderCategoryTabs();
    renderCategoryProducts();
  } else if (page === 'search') {
    back.style.display = 'block'; title.textContent = '搜索';
    updateTabs(null);
    setTimeout(() => document.getElementById('searchInput')?.focus(), 100);
  } else if (page === 'detail') {
    back.style.display = 'block'; share.style.display = 'block';
    title.textContent = '产品详情';
    updateTabs(null);
  } else if (page === 'about') {
    back.style.display = 'none'; title.textContent = '关于';
    updateTabs('about');
    document.getElementById('aboutCount').textContent = products.length;
    document.getElementById('aboutWechat').textContent = wechatId;
  }
  document.getElementById('pages').scrollTop = 0;
}

function goBack() {
  const prev = pageStack.pop() || 'home';
  showPage(prev, false);
}

function updateTabs(active) {
  document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
  if (active) document.getElementById('tab-'+active).classList.add('active');
}

function switchTab(tab) {
  pageStack = [];
  showPage(tab, false);
}

function showCategory(cat) {
  activeCategory = cat;
  switchTab('category');
}

function setCategory(cat) {
  activeCategory = cat;
  renderCategoryTabs();
  renderCategoryProducts();
}

function showDetail(id) {
  const p = products.find(x => x.id === id);
  if (!p) return;
  showPage('detail');

  const grad = p.color || '#1a1a2e';
  document.getElementById('detailSwiper').innerHTML = `
    <div class="detail-placeholder-2" style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:80px;background:linear-gradient(135deg,${grad},#0a0a0f);">${categoryIcon(p.category)}</div>
    <div class="detail-dots"><span class="banner-dot active"></span></div>`;

  document.getElementById('detailInfo').innerHTML = `
    <div class="info-name">${p.name}</div>
    <span class="info-price">${p.price ? '¥'+p.price : '询价'}</span>
    <span class="info-meta">${p.brand} · ${p.model} · ${p.category}</span>`;

  const desc = document.getElementById('detailDesc');
  if (p.description) {
    desc.style.display = 'block';
    desc.innerHTML = `<div class="desc-text">${p.description}</div>`;
  } else { desc.style.display = 'none'; }

  document.getElementById('detailSpecs').innerHTML = `
    <span class="specs-title">📋 详细规格</span>
    <div class="specs-table">
      ${p.specs.map(s => `<div class="spec-row"><span class="spec-key">${s.k}</span><span class="spec-value">${s.v}</span></div>`).join('')}
    </div>`;
}

// === SEARCH ===
function doSearch() {
  const kw = document.getElementById('searchInput').value.trim().toLowerCase();
  document.getElementById('clearBtn').style.display = kw ? 'block' : 'none';
  document.getElementById('hotTags').style.display = kw ? 'none' : 'flex';

  if (!kw) {
    document.getElementById('searchResults').innerHTML = '';
    return;
  }

  const results = products.filter(p =>
    p.name.toLowerCase().includes(kw) || p.description.toLowerCase().includes(kw)
  );

  document.getElementById('searchResults').innerHTML = `
    <div style="padding:8px 16px;font-size:13px;color:var(--text-secondary);">找到 ${results.length} 个产品</div>
    ${results.length === 0 ? '<div class="empty-state">未找到相关产品</div>' : results.map(p => `
      <div class="result-item" onclick="showDetail('${p.id}')">
        <div class="result-placeholder">${categoryIcon(p.category)}</div>
        <div class="result-body">
          <div class="result-name">${p.name}</div>
          <div class="result-meta">${p.brand} · ${p.category}</div>
          <div class="result-price">${p.price ? '¥'+p.price : '询价'}</div>
        </div>
      </div>
    `).join('')}`;
}

function quickSearch(tag) {
  document.getElementById('searchInput').value = tag;
  doSearch();
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  doSearch();
  document.getElementById('searchInput').focus();
}

// === ACTIONS ===
function copyWechat() {
  navigator.clipboard.writeText(wechatId).then(() => showToast('微信号已复制'));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// === BANNER AUTO ===
let bannerIdx = 0;
const bannerProducts = products.filter(p => p.isHot).sort((a,b) => b.sort - a.sort).slice(0,3);
setInterval(() => {
  bannerIdx = (bannerIdx + 1) % bannerProducts.length;
  if (currentPage === 'home' && bannerProducts.length) {
    const p = bannerProducts[bannerIdx];
    const dots = document.querySelectorAll('#banner .banner-dot');
    dots.forEach((d,i) => d.classList.toggle('active', i === bannerIdx));
    const slide = document.querySelector('#banner .banner-slide');
    slide.style.background = `linear-gradient(135deg, #1a1040, #0d1b3e, #0a0a0f)`;
    slide.querySelector('.banner-name').textContent = p.name;
    slide.querySelector('.banner-price').textContent = p.price ? '¥'+p.price : '询价';
    slide.onclick = () => showDetail(p.id);
  }
}, 4000);

// === INIT ===
renderHomeCategories();
renderHotProducts();
renderCategoryTabs();
renderCategoryProducts();
</script>
